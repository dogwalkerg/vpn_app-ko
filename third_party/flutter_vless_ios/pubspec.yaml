name: flutter_vless
description: Apple-only Xray packet tunnel adapter for vpn_app.
version: 1.1.4
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_vless_platform_interface: ^1.1.0
  yaml: ^3.1.2

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: FlutterVlessPlugin
