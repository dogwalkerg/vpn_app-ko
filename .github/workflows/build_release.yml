name: Flutter CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "1.0.25"

permissions:
  contents: write

env:
  BASE_URL: "https://1api.cnam.ccwu.cc"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter analyze || true
    - run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - name: Restore Android release keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
          echo "::error::ANDROID_KEYSTORE_BASE64 is not configured"
          exit 1
        fi
        mkdir -p android/keystore
        printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/my-release-key.jks
    - run: flutter build apk --release --build-name=${{ inputs.version }} --build-number=${{ github.run_number }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter create --platforms=ios,macos .
    - name: Set iOS deployment target
      run: |
        python3 - <<'PY'
        from pathlib import Path
        podfile = Path('ios/Podfile')
        text = podfile.read_text()
        sources = ["source 'https://github.com/CocoaPods/Specs.git'"]
        for source in reversed(sources):
            if source not in text:
                text = source + '\n' + text
        lines = text.splitlines()
        out = []
        done = False
        for line in lines:
            stripped = line.strip()
            if stripped.startswith('platform :ios') or stripped.startswith('# platform :ios'):
                if not done:
                    out.append("platform :ios, '15.0'")
                    done = True
                continue
            out.append(line)
        if not done:
            out.insert(0, "platform :ios, '15.0'")
        podfile.write_text('\n'.join(out) + '\n')
        pbx = Path('ios/Runner.xcodeproj/project.pbxproj')
        text = pbx.read_text().replace('IPHONEOS_DEPLOYMENT_TARGET = 13.0;', 'IPHONEOS_DEPLOYMENT_TARGET = 15.0;')
        text = text.replace('IPHONEOS_DEPLOYMENT_TARGET = 12.0;', 'IPHONEOS_DEPLOYMENT_TARGET = 15.0;')
        pbx.write_text(text)
        PY
        grep -n "platform" ios/Podfile
        grep -n "IPHONEOS_DEPLOYMENT_TARGET" ios/Runner.xcodeproj/project.pbxproj || true
    - run: flutter pub get
    - name: Install iOS pods
      working-directory: ios
      run: pod install --repo-update
    - run: flutter build ios --release --no-codesign --build-name=${{ inputs.version }} --build-number=${{ github.run_number }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Package IPA (unsigned)
      run: |
        rm -rf Payload app-release-unsigned.ipa
        mkdir -p Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -r app-release-unsigned.ipa Payload/
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-ipa
        path: app-release-unsigned.ipa
        if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter config --enable-windows-desktop
    - run: flutter build windows --release --build-name=${{ inputs.version }} --build-number=${{ github.run_number }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Show Windows build output
      shell: pwsh
      run: Get-ChildItem -Recurse build/windows | Select-Object FullName,Length | Out-String -Width 240
    - name: Package Windows
      shell: pwsh
      run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath app-release-windows.zip -Force
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-windows
        path: app-release-windows.zip
        if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter create --platforms=ios,macos .
    - name: Set macOS deployment target
      run: |
        python3 - <<'PY'
        from pathlib import Path
        import re
        podfile = Path('macos/Podfile')
        lines = podfile.read_text().splitlines()
        out = []
        done = False
        for line in lines:
            stripped = line.strip()
            if stripped.startswith('platform :osx') or stripped.startswith('# platform :osx'):
                if not done:
                    out.append("platform :osx, '12.0'")
                    done = True
                continue
            out.append(line)
        if not done:
            out.insert(0, "platform :osx, '12.0'")
        podfile.write_text('\n'.join(out) + '\n')
        pbx = Path('macos/Runner.xcodeproj/project.pbxproj')
        text = re.sub(r'MACOSX_DEPLOYMENT_TARGET = [0-9.]+;', 'MACOSX_DEPLOYMENT_TARGET = 12.0;', pbx.read_text())
        pbx.write_text(text)
        PY
        grep -n "platform" macos/Podfile
        grep -n "MACOSX_DEPLOYMENT_TARGET" macos/Runner.xcodeproj/project.pbxproj || true
    - run: flutter pub get
    - run: flutter config --enable-macos-desktop
    - run: flutter build macos --release --build-name=${{ inputs.version }} --build-number=${{ github.run_number }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Package macOS
      run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/vpn_app.app app-release-macos.zip
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-macos
        path: app-release-macos.zip
        if-no-files-found: error

  release:
    needs: [build-android, build-ios, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Release v${{ github.event.inputs.version }}
        target_commitish: ${{ github.sha }}
        body: "Android APK + unsigned iOS IPA + Windows + macOS"
        files: artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
