name: Flutter CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "1.0.32"
      ios_only:
        description: "Only compile the iOS app and Packet Tunnel"
        type: boolean
        required: false
        default: false
      signed_ios:
        description: "Build and publish the formally signed iOS IPA"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  BASE_URL: "https://1api.cnam.ccwu.cc"

jobs:
  analyze:
    if: ${{ !inputs.signed_ios }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter analyze
    - run: flutter test

  build-android:
    if: ${{ !inputs.ios_only }}
    runs-on: ubuntu-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - name: Restore Android release keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
          echo "::error::ANDROID_KEYSTORE_BASE64 is not configured"
          exit 1
        fi
        mkdir -p android/keystore
        printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/my-release-key.jks
    - run: flutter build apk --release --build-name=${{ inputs.version }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Package Android
      run: cp build/app/outputs/flutter-apk/app-release.apk "Osca-Android-v${{ inputs.version }}.apk"
    - uses: actions/upload-artifact@v4
      with:
        name: Osca-Android
        path: Osca-Android-v${{ inputs.version }}.apk
        if-no-files-found: error

  build-ios:
    if: ${{ !inputs.signed_ios }}
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - name: Install pinned iOS Xray framework
      run: bash tool/setup_ios_xray.sh
    - name: Install iOS pods
      working-directory: ios
      run: pod install --repo-update
    - run: flutter build ios --release --no-codesign --build-name=${{ inputs.version }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Verify Packet Tunnel structure
      run: |
        set -euo pipefail
        app="build/ios/iphoneos/Runner.app"
        tunnel="${app}/PlugIns/XrayTunnel.appex"
        test -d "${tunnel}"
        test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${app}/Info.plist")" = "app.ocelot3040.maroon4586"
        test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${tunnel}/Info.plist")" = "app.ocelot3040.maroon4586.XrayTunnel"
        test -f "${tunnel}/XrayTunnel"
    - name: Package IPA compile check (unsigned)
      run: |
        rm -rf Payload "Osca-iOS-v${{ inputs.version }}-unsigned.ipa"
        mkdir Payload
        ditto build/ios/iphoneos/Runner.app Payload/Runner.app
        ditto -c -k --sequesterRsrc --keepParent Payload "Osca-iOS-v${{ inputs.version }}-unsigned.ipa"
    - uses: actions/upload-artifact@v4
      with:
        name: Osca-iOS-unsigned
        path: Osca-iOS-v${{ inputs.version }}-unsigned.ipa
        if-no-files-found: error

  build-ios-signed:
    if: ${{ inputs.ios_only && inputs.signed_ios }}
    uses: ./.github/workflows/build_ios_release.yml
    with:
      version: ${{ inputs.version }}
      publish_release: true
    secrets: inherit

  build-windows:
    if: ${{ !inputs.ios_only }}
    runs-on: windows-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter config --enable-windows-desktop
    - run: flutter build windows --release --build-name=${{ inputs.version }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Show Windows build output
      shell: pwsh
      run: Get-ChildItem -Recurse build/windows | Select-Object FullName,Length | Out-String -Width 240
    - name: Package Windows
      shell: pwsh
      run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "Osca-Windows-v${{ inputs.version }}.zip" -Force
    - uses: actions/upload-artifact@v4
      with:
        name: Osca-Windows
        path: Osca-Windows-v${{ inputs.version }}.zip
        if-no-files-found: error

  build-macos:
    if: ${{ !inputs.ios_only }}
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter create --platforms=ios,macos .
    - name: Set macOS deployment target
      run: |
        python3 - <<'PY'
        from pathlib import Path
        import re
        podfile = Path('macos/Podfile')
        lines = podfile.read_text().splitlines()
        out = []
        done = False
        for line in lines:
            stripped = line.strip()
            if stripped.startswith('platform :osx') or stripped.startswith('# platform :osx'):
                if not done:
                    out.append("platform :osx, '12.0'")
                    done = True
                continue
            out.append(line)
        if not done:
            out.insert(0, "platform :osx, '12.0'")
        podfile.write_text('\n'.join(out) + '\n')
        pbx = Path('macos/Runner.xcodeproj/project.pbxproj')
        text = re.sub(r'MACOSX_DEPLOYMENT_TARGET = [0-9.]+;', 'MACOSX_DEPLOYMENT_TARGET = 12.0;', pbx.read_text())
        pbx.write_text(text)
        PY
        grep -n "platform" macos/Podfile
        grep -n "MACOSX_DEPLOYMENT_TARGET" macos/Runner.xcodeproj/project.pbxproj || true
    - run: flutter pub get
    - run: flutter config --enable-macos-desktop
    - run: flutter build macos --release --build-name=${{ inputs.version }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Package macOS
      run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/Osca.app "Osca-macOS-v${{ inputs.version }}.zip"
    - uses: actions/upload-artifact@v4
      with:
        name: Osca-macOS
        path: Osca-macOS-v${{ inputs.version }}.zip
        if-no-files-found: error

  release:
    needs: [build-android, build-ios, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: >-
      ${{ always() && !inputs.ios_only &&
          needs.build-android.result == 'success' &&
          needs.build-ios.result == 'success' &&
          needs.build-windows.result == 'success' &&
          needs.build-macos.result == 'success' }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Osca v${{ github.event.inputs.version }}
        target_commitish: ${{ github.sha }}
        body: "Osca for Android, unsigned iOS, Windows, and macOS."
        files: artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
