name: Flutter CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "1.0.3"

env:
  BASE_URL: "https://app.xsh.ccwu.cc"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter analyze || true

  build-android:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter build apk --release --dart-define=BASE_URL=${{ env.BASE_URL }}
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter create --platforms=ios,macos .
    - name: Set iOS deployment target
      run: |
        python3 - <<'PY'
        from pathlib import Path
        podfile = Path('ios/Podfile')
        lines = podfile.read_text().splitlines()
        out = []
        done = False
        for line in lines:
            stripped = line.strip()
            if stripped.startswith('platform :ios') or stripped.startswith('# platform :ios'):
                if not done:
                    out.append("platform :ios, '15.0'")
                    done = True
                continue
            out.append(line)
        if not done:
            out.insert(0, "platform :ios, '15.0'")
        podfile.write_text('\n'.join(out) + '\n')
        pbx = Path('ios/Runner.xcodeproj/project.pbxproj')
        text = pbx.read_text().replace('IPHONEOS_DEPLOYMENT_TARGET = 13.0;', 'IPHONEOS_DEPLOYMENT_TARGET = 15.0;')
        text = text.replace('IPHONEOS_DEPLOYMENT_TARGET = 12.0;', 'IPHONEOS_DEPLOYMENT_TARGET = 15.0;')
        pbx.write_text(text)
        PY
        grep -n "platform" ios/Podfile
        grep -n "IPHONEOS_DEPLOYMENT_TARGET" ios/Runner.xcodeproj/project.pbxproj || true
    - run: flutter pub get
    - name: Update CocoaPods specs
      run: pod repo update
    - run: flutter build ios --release --no-codesign --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Package IPA (unsigned)
      run: |
        rm -rf Payload app-release-unsigned.ipa
        mkdir -p Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -r app-release-unsigned.ipa Payload/
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-ipa
        path: app-release-unsigned.ipa
        if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter config --enable-windows-desktop
    - run: flutter build windows --release --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Show Windows build output
      shell: pwsh
      run: Get-ChildItem -Recurse build/windows | Select-Object FullName,Length | Out-String -Width 240
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-windows
        path: build/windows/x64/runner/Release/
        if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter create --platforms=ios,macos .
    - name: Set macOS deployment target
      run: |
        python3 - <<'PY'
        from pathlib import Path
        podfile = Path('macos/Podfile')
        lines = podfile.read_text().splitlines()
        out = []
        done = False
        for line in lines:
            stripped = line.strip()
            if stripped.startswith('platform :osx') or stripped.startswith('# platform :osx'):
                if not done:
                    out.append("platform :osx, '12.0'")
                    done = True
                continue
            out.append(line)
        if not done:
            out.insert(0, "platform :osx, '12.0'")
        podfile.write_text('\n'.join(out) + '\n')
        pbx = Path('macos/Runner.xcodeproj/project.pbxproj')
        text = pbx.read_text().replace('MACOSX_DEPLOYMENT_TARGET = 10.15;', 'MACOSX_DEPLOYMENT_TARGET = 12.0;')
        text = text.replace('MACOSX_DEPLOYMENT_TARGET = 11.0;', 'MACOSX_DEPLOYMENT_TARGET = 12.0;')
        pbx.write_text(text)
        PY
        grep -n "platform" macos/Podfile
        grep -n "MACOSX_DEPLOYMENT_TARGET" macos/Runner.xcodeproj/project.pbxproj || true
    - run: flutter pub get
    - run: flutter config --enable-macos-desktop
    - run: flutter build macos --release --dart-define=BASE_URL=${{ env.BASE_URL }}
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-macos
        path: build/macos/Build/Products/Release/
        if-no-files-found: error

  release:
    needs: [build-android, build-ios, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Release v${{ github.event.inputs.version }}
        body: "Android APK + unsigned iOS IPA + Windows + macOS"
        files: artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
