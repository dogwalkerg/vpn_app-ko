name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "1.0.1"

env:
  BASE_URL: "https://app.xsh.ccwu.cc"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter analyze || true

  build-android:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter build apk --release --dart-define=BASE_URL=${{ env.BASE_URL }}
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter create --platforms=ios,macos .
    - run: flutter pub get
    - run: flutter build ios --release --no-codesign --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Package IPA (unsigned)
      run: |
        rm -rf Payload app-release-unsigned.ipa
        mkdir -p Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -r app-release-unsigned.ipa Payload/
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-ipa
        path: app-release-unsigned.ipa
        if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter pub get
    - run: flutter config --enable-windows-desktop
    - run: flutter build windows --release --dart-define=BASE_URL=${{ env.BASE_URL }}
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-windows
        path: build/windows/runner/Release/
        if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.x
    - run: flutter create --platforms=ios,macos .
    - run: flutter pub get
    - run: flutter config --enable-macos-desktop
    - run: flutter build macos --release --dart-define=BASE_URL=${{ env.BASE_URL }}
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-macos
        path: build/macos/Build/Products/Release/
        if-no-files-found: error

  release:
    needs: [build-android, build-ios, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: app-release-apk
        path: artifacts/apk
    - uses: actions/download-artifact@v4
      with:
        name: app-release-ipa
        path: artifacts/ipa
    - uses: actions/download-artifact@v4
      with:
        name: app-release-windows
        path: artifacts/windows
    - uses: actions/download-artifact@v4
      with:
        name: app-release-macos
        path: artifacts/macos
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Release v${{ github.event.inputs.version }}
        body: "Android APK + unsigned iOS IPA + Windows + macOS"
        files: artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
