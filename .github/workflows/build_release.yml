name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BASE_URL: "https://app.xsh.ccwu.cc"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.24.x
    - run: flutter pub get
    - run: flutter format --set-exit-if-changed .
    - run: flutter analyze

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.24.x
    - run: flutter pub get
    - run: flutter test

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.24.x
    - run: flutter pub get
    - run: flutter build apk --release --dart-define=BASE_URL=${{ env.BASE_URL }}
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.24.x
    - run: flutter pub get
    - run: flutter config --enable-windows-desktop
    - run: flutter build windows --release --dart-define=BASE_URL=${{ env.BASE_URL }}
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-windows
        path: build/windows/runner/Release/
        if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.24.x
    - run: flutter pub get
    - run: flutter config --enable-macos-desktop
    - run: flutter build macos --release --dart-define=BASE_URL=${{ env.BASE_URL }}
    - uses: actions/upload-artifact@v4
      with:
        name: app-release-macos
        path: build/macos/Build/Products/Release/
        if-no-files-found: warn