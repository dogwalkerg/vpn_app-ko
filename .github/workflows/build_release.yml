name: Build & Release All Platforms

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'

jobs:
  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Create keystore for signing
        run: |
          mkdir -p android/keystore
          keytool -genkey -v \
            -keystore android/keystore/my-release-key.jks \
            -alias my-key-alias \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 33772744 -keypass 33772744 \
            -dname "CN=VPN App, OU=Development, O=VPN, L=City, ST=State, C=US"

      - name: Update pubspec version
        run: |
          sed -i "s/version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.version_code }}/" pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Build Android APK (release split per abi)
        run: flutter build apk --release --split-per-abi

      - name: Build Android AppBundle
        run: flutter build appbundle --release

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Update pubspec version
        run: |
          sed -i "s/version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.version_code }}/" pubspec.yaml
        shell: bash

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/runner/release

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Update pubspec version
        run: |
          sed -i "s/version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.version_code }}/" pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          architecture: x64

      - name: Update pubspec version
        run: |
          sed -i "" "s/version: .*/version: ${{ github.event.inputs.version }}+${{ github.event.inputs.version_code }}/" pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release

  create-release:
    name: Create Release & Upload All Artifacts
    needs: [build-android, build-web, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archive directory
        run: |
          mkdir -p release-assets
          VERSION="${{ github.event.inputs.version }}"
          
          # Android
          if [ -d "artifacts/android-release" ]; then
            mkdir -p "release-assets/android"
            cp -r artifacts/android-release/* "release-assets/android/"
          fi
          
          # Web  
          if [ -d "artifacts/web-release" ]; then
            cd artifacts/web-release
            zip -r "../../release-assets/vpn_app_web_${VERSION}.zip" .
            cd ../..
          fi
          
          # Windows
          if [ -d "artifacts/windows-release" ]; then
            cd artifacts/windows-release
            zip -r "../../release-assets/vpn_app_windows_${VERSION}.zip" .
            cd ../..
          fi
          
          # Linux
          if [ -d "artifacts/linux-release" ]; then
            cd artifacts/linux-release
            zip -r "../../release-assets/vpn_app_linux_${VERSION}.zip" .
            cd ../..
          fi
          
          # macOS
          if [ -d "artifacts/macos-release" ]; then
            cd artifacts/macos-release
            zip -r "../../release-assets/vpn_app_macos_${VERSION}.zip" .
            cd ../..
          fi
          
          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body: |
            ## VPN App v${{ github.event.inputs.version }}
            
            ### Platforms
            - **Android**: APK (universal + split per ABI) + AppBundle
            - **Windows**: Portable ZIP
            - **Linux**: Portable bundle ZIP
            - **macOS**: Build bundle ZIP
            - **Web**: ZIP archive
            
            ### Changelog
            - Automated build release
          commit: main
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "release-assets/*"
          artifactContentType: application/zip
          replacesArtifacts: true
          allowUpdates: true
