name: Flutter CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "1.0.39"
      ios_only:
        description: "Only compile the iOS app and Packet Tunnel"
        type: boolean
        required: false
        default: false
      signed_ios:
        description: "Build and publish the formally signed iOS IPA"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

env:
  BASE_URL: "https://1api.cnam.ccwu.cc"

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Validate release inputs
      env:
        RELEASE_VERSION: ${{ inputs.version }}
        IOS_ONLY: ${{ inputs.ios_only }}
        SIGNED_IOS: ${{ inputs.signed_ios }}
      run: |
        bash tool/validate_release_version.sh "${RELEASE_VERSION}"
        if [[ "${SIGNED_IOS}" == "true" && "${IOS_ONLY}" != "true" ]]; then
          echo "::error::signed_ios requires ios_only so the workflow has an unambiguous release mode"
          exit 1
        fi

  analyze:
    if: ${{ !inputs.signed_ios }}
    runs-on: ubuntu-latest
    needs: validate-inputs
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.6
    - run: flutter pub get
    - run: flutter analyze
    - run: flutter test

  build-android:
    if: ${{ !inputs.ios_only }}
    runs-on: ubuntu-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.6
    - run: flutter pub get
    - name: Restore Android release keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
          echo "::error::ANDROID_KEYSTORE_BASE64 is not configured"
          exit 1
        fi
        mkdir -p android/keystore
        printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/my-release-key.jks
    - run: flutter build apk --release --build-name=${{ inputs.version }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Package Android
      run: cp build/app/outputs/flutter-apk/app-release.apk "Osca-Android-v${{ inputs.version }}.apk"
    - uses: actions/upload-artifact@v4
      with:
        name: Osca-Android-v${{ inputs.version }}
        path: Osca-Android-v${{ inputs.version }}.apk
        if-no-files-found: error

  build-ios:
    if: ${{ !inputs.signed_ios }}
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.6
    - run: flutter pub get
    - name: Install pinned iOS Xray framework
      run: bash tool/setup_ios_xray.sh
    - name: Install iOS pods
      working-directory: ios
      run: pod install --repo-update
    - name: Compile iOS Swift package tests and Packet Tunnel
      run: bash tool/verify_ios_native_build.sh
    - name: Upload iOS native build diagnostics
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Osca-iOS-v${{ inputs.version }}-native-diagnostics
        path: |
          ${{ runner.temp }}/Osca-iOS-*.log
          ${{ runner.temp }}/Osca-iOS-*.xcresult
          ${{ runner.temp }}/Osca-iOS-*-schemes.json
        if-no-files-found: ignore
        retention-days: 7
    - run: flutter build ios --release --no-codesign --build-name=${{ inputs.version }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Verify Packet Tunnel structure
      run: |
        set -euo pipefail
        app="build/ios/iphoneos/Runner.app"
        tunnel="${app}/PlugIns/XrayTunnel.appex"
        test -d "${tunnel}"
        test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${app}/Info.plist")" = "app.ocelot3040.maroon4586"
        test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${tunnel}/Info.plist")" = "app.ocelot3040.maroon4586.XrayTunnel"
        test -f "${tunnel}/XrayTunnel"
    - name: Package IPA compile check (unsigned)
      run: |
        rm -rf Payload "Osca-iOS-v${{ inputs.version }}-unsigned.ipa"
        mkdir Payload
        ditto build/ios/iphoneos/Runner.app Payload/Runner.app
        ditto -c -k --sequesterRsrc --keepParent Payload "Osca-iOS-v${{ inputs.version }}-unsigned.ipa"
    - uses: actions/upload-artifact@v4
      with:
        name: Osca-iOS-v${{ inputs.version }}-unsigned
        path: Osca-iOS-v${{ inputs.version }}-unsigned.ipa
        if-no-files-found: error

  build-ios-signed:
    if: ${{ inputs.ios_only && inputs.signed_ios }}
    needs: validate-inputs
    uses: ./.github/workflows/build_ios_release.yml
    with:
      version: ${{ inputs.version }}
      publish_release: true
    secrets: inherit

  build-windows:
    if: ${{ !inputs.ios_only }}
    runs-on: windows-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.6
    - run: flutter pub get
    - run: flutter config --enable-windows-desktop
    - run: flutter build windows --release --build-name=${{ inputs.version }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Show Windows build output
      shell: pwsh
      run: Get-ChildItem -Recurse build/windows | Select-Object FullName,Length | Out-String -Width 240
    - name: Package Windows
      shell: pwsh
      run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "Osca-Windows-v${{ inputs.version }}.zip" -Force
    - uses: actions/upload-artifact@v4
      with:
        name: Osca-Windows-v${{ inputs.version }}
        path: Osca-Windows-v${{ inputs.version }}.zip
        if-no-files-found: error

  build-macos:
    if: ${{ !inputs.ios_only }}
    runs-on: macos-latest
    needs: analyze
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.44.6
    - name: Validate macOS deployment targets
      run: |
        set -euo pipefail
        grep -Fqx "platform :osx, '12.0'" macos/Podfile
        grep -Fqx 'MACOSX_DEPLOYMENT_TARGET = 12.0' macos/Runner/Configs/AppInfo.xcconfig
    - run: flutter pub get
    - run: flutter config --enable-macos-desktop
    - run: flutter build macos --release --build-name=${{ inputs.version }} --dart-define=BASE_URL=${{ env.BASE_URL }}
    - name: Run macOS RunnerTests
      run: bash tool/run_macos_runner_tests.sh
    - name: Upload macOS RunnerTests diagnostics
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Osca-macOS-v${{ inputs.version }}-test-diagnostics
        path: |
          ${{ runner.temp }}/Osca-macOS-RunnerTests.log
          ${{ runner.temp }}/Osca-macOS-RunnerTests.xcresult
        if-no-files-found: ignore
        retention-days: 7
    - name: Package macOS
      run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/Osca.app "Osca-macOS-v${{ inputs.version }}.zip"
    - uses: actions/upload-artifact@v4
      with:
        name: Osca-macOS-v${{ inputs.version }}
        path: Osca-macOS-v${{ inputs.version }}.zip
        if-no-files-found: error

  release:
    needs: [build-android, build-ios, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: >-
      ${{ always() && !inputs.ios_only &&
          needs.build-android.result == 'success' &&
          needs.build-ios.result == 'success' &&
          needs.build-windows.result == 'success' &&
          needs.build-macos.result == 'success' }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ inputs.version }}
        name: Osca v${{ inputs.version }}
        target_commitish: ${{ github.sha }}
        body: "Osca for Android, unsigned iOS, Windows, and macOS."
        files: artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
